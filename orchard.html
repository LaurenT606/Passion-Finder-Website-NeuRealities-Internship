<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassionFruits – The Orchard</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background-color:#38167d; font-family:'Press Start 2P',monospace; overflow-x:hidden; user-select:none; }
.nav { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:3px solid rgba(255,255,255,0.1); }
.back-btn { font-family:'Press Start 2P',monospace; font-size:0.5rem; color:#F7C948; background:none; border:2px solid #F7C948; border-radius:8px; padding:8px 12px; cursor:pointer; }
.back-btn:hover { background:rgba(247,201,72,0.15); }
.logo { font-family:'Bangers',cursive; font-size:1.6rem; color:#F7C948; letter-spacing:0.08em; -webkit-text-stroke:1.2px #3A1E00; text-shadow:2px 2px 0 #3A1E00; }
.title-row { display:flex; align-items:center; justify-content:center; gap:14px; padding:28px 0 8px; }
.title-row img { width:110px; height:auto; image-rendering:pixelated; }
.orchard-title { font-family:'Bangers',cursive; font-size:2.4rem; color:#F7C948; letter-spacing:0.1em; -webkit-text-stroke:1.5px #3A1E00; text-shadow:3px 3px 0 #3A1E00; }
.orchard-sub { text-align:center; font-size:0.42rem; color:rgba(255,255,255,0.55); letter-spacing:0.1em; margin-bottom:30px; }
.grove { display:grid; grid-template-columns:repeat(3,1fr); gap:36px; max-width:1100px; margin:0 auto; padding:0 30px 50px; }
@media (max-width:760px) { .grove { grid-template-columns:repeat(2,1fr); } }
.plot { display:flex; flex-direction:column; align-items:center; gap:10px; }
.plot-frame { display:flex; align-items:flex-end; gap:8px; position:relative; }
.book-icon-btn { background:none; border:none; cursor:pointer; padding:0; margin-bottom:18px; transition:transform 0.15s; }
.book-icon-btn:hover { transform:scale(1.12); }
.book-icon-btn img { width:34px; height:auto; image-rendering:pixelated; }
.book-icon-btn.empty { opacity:0.25; cursor:default; }
.mini-tree-wrap { position:relative; width:150px; height:150px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.mini-tree-wrap img.tree { width:100%; height:100%; object-fit:contain; image-rendering:pixelated; transition:filter 0.15s; }
.mini-tree-wrap:hover img.tree { filter:brightness(1.15); }
.empty-plot .mini-tree-wrap { cursor:default; opacity:0.3; }
.empty-plot .mini-tree-wrap img.tree { filter:grayscale(1); }
.plot-name { font-size:0.5rem; color:#F7C948; letter-spacing:0.08em; text-transform:uppercase; }
.empty-plot .plot-name { color:rgba(255,255,255,0.3); }
.empty-label { font-size:0.32rem; color:rgba(255,255,255,0.3); letter-spacing:0.08em; }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
.overlay.active { display:flex; }
.popup { background:#2a0e5e; border:4px solid #F7C948; border-radius:22px; padding:32px 36px; width:clamp(280px,90vw,420px); display:flex; flex-direction:column; align-items:center; gap:14px; position:relative; }
.popup-close { position:absolute; top:14px; right:18px; background:none; border:none; color:rgba(255,255,255,0.4); font-size:0.9rem; cursor:pointer; font-family:'Press Start 2P',monospace; }
.popup-close:hover { color:#fff; }
.popup-name { font-family:'Bangers',cursive; font-size:1.6rem; color:#F7C948; letter-spacing:0.06em; }
.popup-photo { width:220px; max-width:100%; border-radius:12px; border:3px solid #F7C948; }
.popup-caption { font-size:0.42rem; color:#fff; text-align:center; letter-spacing:0.07em; line-height:1.8; }
.popup-subject { font-size:0.32rem; color:rgba(255,255,255,0.5); letter-spacing:0.1em; text-transform:uppercase; }
.btn-gold { font-family:'Press Start 2P',monospace; font-size:0.46rem; color:#38167d; background:#F7C948; border:none; border-radius:10px; padding:11px 20px; cursor:pointer; margin-top:6px; }
.btn-gold:hover { background:#ffe066; }
</style>
</head>
<body>
<div class="nav">
    <button class="back-btn" onclick="window.location.href='tree.html'">← My Tree</button>
    <span class="logo">PassionFruits</span>
    <span style="width:90px;"></span>
</div>

<div class="title-row">
    <span class="orchard-title">The Orchard</span>
    <img src="signpost.png" alt="The Orchard">
</div>
<p class="orchard-sub">Peek at your friends' trees</p>

<div class="grove" id="grove"></div>

<div class="overlay" id="overlay">
    <div class="popup">
        <button class="popup-close" onclick="closePopup()">✕</button>
        <span class="popup-name" id="pop-name"></span>
        <img class="popup-photo" id="pop-photo" src="" alt="">
        <p class="popup-caption" id="pop-caption"></p>
        <p class="popup-subject" id="pop-subject"></p>
        <button class="btn-gold" onclick="closePopup()">Nice! ✓</button>
    </div>
</div>

<script>
// Demo / placeholder friend data — no backend yet, just hardcoded for now.
const FRIENDS = [
    { name:'Kai',   subject:'Sports',         caption:'Sparring session at martial arts class', photo:'kai_sports.jpg' },
    { name:'Ahaana',subject:'World Language', caption:'Hit a 1000-day language streak!',          photo:null, icon:'download.png' },
    { name:'Noah',  subject:'World Language', caption:'Working on the yearbook spreads',          photo:'noah_yearbook.jpg' },
    { name:'Sasha', subject:'Math',           caption:'Practicing for Math Olympiad',             photo:null, icon:'download-2.jpg' },
    { name:'Lauren',subject:'Math',           caption:'Building a personal budget',               photo:null, icon:'download-3.jpg' },
    null, // empty 6th plot
];

function renderGrove() {
    const grove = document.getElementById('grove');
    grove.innerHTML = '';
    FRIENDS.forEach((f, i) => {
        const plot = document.createElement('div');
        plot.className = 'plot' + (f ? '' : ' empty-plot');

        const frame = document.createElement('div');
        frame.className = 'plot-frame';

        const bookBtn = document.createElement('button');
        bookBtn.className = 'book-icon-btn' + (f ? '' : ' empty');
        bookBtn.innerHTML = '<img src="book_icon.png" alt="book">';
        if (f) bookBtn.onclick = () => openFriendBook(f);
        frame.appendChild(bookBtn);

        const treeWrap = document.createElement('div');
        treeWrap.className = 'mini-tree-wrap';
        const treeImg = document.createElement('img');
        treeImg.className = 'tree';
        treeImg.src = 'tree_big.png';
        treeWrap.appendChild(treeImg);
        if (f) treeWrap.onclick = () => openFriendBook(f);
        frame.appendChild(treeWrap);

        plot.appendChild(frame);

        const nameEl = document.createElement('div');
        nameEl.className = 'plot-name';
        nameEl.textContent = f ? f.name : '';
        plot.appendChild(nameEl);

        if (!f) {
            const empty = document.createElement('div');
            empty.className = 'empty-label';
            empty.textContent = 'open plot';
            plot.appendChild(empty);
        }

        grove.appendChild(plot);
    });
}

function openFriendBook(f) {
    document.getElementById('pop-name').textContent = f.name + "'s Book";
    document.getElementById('pop-photo').src = f.photo || f.icon;
    document.getElementById('pop-photo').style.objectFit = f.photo ? 'cover' : 'contain';
    document.getElementById('pop-photo').style.background = f.photo ? 'transparent' : '#1f0d47';
    document.getElementById('pop-caption').textContent = f.caption;
    document.getElementById('pop-subject').textContent = f.subject;
    document.getElementById('overlay').classList.add('active');
}
function closePopup() { document.getElementById('overlay').classList.remove('active'); }

renderGrove();
</script>
</body>
</html>
