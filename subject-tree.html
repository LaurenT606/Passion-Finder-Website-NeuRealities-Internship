<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassionFruits – Subject Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background-color:#38167d; font-family:'Press Start 2P',monospace; overflow:hidden; user-select:none; }
.nav { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:3px solid rgba(255,255,255,0.1); position:relative; z-index:20; }
.nav-left { display:flex; align-items:center; gap:16px; }
.back-btn { font-family:'Press Start 2P',monospace; font-size:0.5rem; color:#F7C948; background:none; border:2px solid #F7C948; border-radius:8px; padding:8px 12px; cursor:pointer; }
.back-btn:hover { background:rgba(247,201,72,0.15); }
.logo { font-family:'Bangers',cursive; font-size:1.6rem; color:#F7C948; letter-spacing:0.08em; -webkit-text-stroke:1.2px #3A1E00; text-shadow:2px 2px 0 #3A1E00; }
.subject-tag { font-size:0.5rem; color:#fff; background:#5a30a8; border-radius:8px; padding:8px 14px; letter-spacing:0.08em; text-transform:uppercase; }
.stage { position:relative; width:100%; height:calc(100vh - 62px); display:flex; align-items:center; justify-content:center; }
#tree-img { image-rendering:pixelated; position:relative; z-index:1; max-height:78vh; transition:opacity 0.25s ease; }
.node { position:absolute; cursor:pointer; transform:translate(-50%,-50%); z-index:10; }
.node canvas, .node img { image-rendering:pixelated; display:block; }
.node:hover canvas, .node:hover img { filter:brightness(1.35); }
.progress-pill { position:absolute; top:14px; right:24px; font-size:0.42rem; color:#fff; background:rgba(0,0,0,0.25); border-radius:10px; padding:8px 14px; letter-spacing:0.08em; z-index:15; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:100; align-items:center; justify-content:center; }
.overlay.active { display:flex; }
.popup { background:#2a0e5e; border:4px solid #fff; border-radius:22px; padding:36px 40px; width:clamp(280px,90vw,440px); display:flex; flex-direction:column; align-items:center; gap:18px; position:relative; }
.popup-close { position:absolute; top:14px; right:18px; background:none; border:none; color:rgba(255,255,255,0.4); font-size:0.9rem; cursor:pointer; font-family:'Press Start 2P',monospace; }
.popup-close:hover { color:#fff; }
.popup-emoji { font-size:2.8rem; }
.popup-emoji img { width:64px; height:64px; image-rendering:pixelated; }
.popup-title { font-size:0.58rem; color:#F7C948; text-align:center; letter-spacing:0.1em; line-height:2; text-transform:uppercase; }
.popup-sub { font-size:0.4rem; color:rgba(255,255,255,0.6); text-align:center; line-height:2.2; letter-spacing:0.07em; }
.popup-btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.btn-yes { font-family:'Press Start 2P',monospace; font-size:0.48rem; color:#1a4a1a; background:#44dd44; border:none; border-radius:10px; padding:12px 20px; cursor:pointer; }
.btn-yes:hover { background:#66ff66; }
.btn-no { font-family:'Press Start 2P',monospace; font-size:0.48rem; color:#fff; background:#cc2222; border:none; border-radius:10px; padding:12px 20px; cursor:pointer; }
.btn-no:hover { background:#ff4444; }
.btn-skip { font-family:'Press Start 2P',monospace; font-size:0.48rem; color:#fff; background:#555; border:none; border-radius:10px; padding:12px 20px; cursor:pointer; }
.btn-skip:hover { background:#777; }
.btn-gold { font-family:'Press Start 2P',monospace; font-size:0.48rem; color:#38167d; background:#F7C948; border:none; border-radius:10px; padding:12px 20px; cursor:pointer; }
.btn-gold:hover { background:#ffe066; }
.complete-banner { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); font-size:0.45rem; color:#38167d; background:#F7C948; border-radius:10px; padding:10px 18px; letter-spacing:0.08em; text-transform:uppercase; z-index:15; }
.photo-section { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; }
.photo-upload-btn { font-family:'Press Start 2P',monospace; font-size:0.4rem; color:#fff; background:#5a30a8; border:2px dashed rgba(255,255,255,0.4); border-radius:10px; padding:10px 16px; cursor:pointer; letter-spacing:0.06em; }
.photo-upload-btn:hover { border-color:#F7C948; }
.photo-preview-wrap { position:relative; }
.photo-preview { width:120px; height:90px; object-fit:cover; border-radius:10px; border:2px solid #F7C948; image-rendering:auto; }
.photo-remove { position:absolute; top:-8px; right:-8px; width:20px; height:20px; border-radius:50%; background:#cc2222; color:#fff; border:none; font-size:0.55rem; cursor:pointer; line-height:1; }
.photo-remove:hover { background:#ff4444; }
.compress-note { font-size:0.3rem; color:rgba(255,255,255,0.4); text-align:center; }
</style>
</head>
<body>
<div class="nav">
    <div class="nav-left">
        <button class="back-btn" onclick="goBack()">← My Tree</button>
        <span class="logo">PassionFruits</span>
    </div>
    <span class="subject-tag" id="subject-tag"></span>
</div>
<div class="stage" id="stage">
    <img id="tree-img" src="" alt="subject tree">
</div>

<div class="overlay" id="overlay">
    <div class="popup">
        <button class="popup-close" onclick="closePopup()">✕</button>
        <div class="popup-emoji" id="pop-emoji">🌱</div>
        <p class="popup-title" id="pop-title"></p>
        <p class="popup-sub" id="pop-sub"></p>
        <div class="photo-section" id="photo-section" style="display:none;">
            <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="handlePhotoSelect(event)">
            <div id="photo-area"></div>
        </div>
        <div class="popup-btns" id="pop-btns"></div>
    </div>
</div>

<script>
// ── Setup ──────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const subject = params.get('subject') || 'Math';
document.getElementById('subject-tag').textContent = subject;

const SUBJECT_EMOJI={'Math':'🍎','Science':'🍋','Art':'🍉','History':'🍊','English':'🍋','World Language':'🍇','Music':'🍓','Sports':'🍌','Extra-Curriculars':'🍍'};
const ALL_ACTIVITIES={'Math':['Coding projects','Math olympiad prep','Chess club','Personal finance & budgeting','Puzzle & logic games'],'Science':['Science fair experiments','Stargazing & astronomy','Coding a game','Growing a plant from seed','DIY electronics & circuits'],'Art':['Sketchbook drawing','Digital art & design','Graphic novel making','Phone photography','Mural & street art'],'History':['Local history research','Museum visits','Documentary watching','Historical podcast listening','Family genealogy'],'English':['Fan fiction writing','Poetry writing','Starting a blog','Journaling daily','School newspaper'],'World Language':['Duolingo streaks','Listening to foreign music','Pen pal exchange','Watching subtitled anime','Cooking dishes from other cultures'],'Music':['Learning guitar','Producing beats','Joining a school choir','DJ-ing at school events','Songwriting & lyrics'],'Sports':['Recreational basketball','Skateboarding','Rock climbing gym','Yoga & stretching','Martial arts classes'],'Extra-Curriculars':['Student council','Debate team','Volunteering locally','Environmental club','Yearbook & school media']};
const FRUIT_PALS={'🍎':{'1':'#cc1111','2':'#1a7a1a','3':'#ff6666'},'🍋':{'1':'#ddcc00','2':'#1a7a1a','3':'#ffee66'},'🍉':{'1':'#cc2233','2':'#1a7a1a','3':'#ff6677'},'🍊':{'1':'#dd6600','2':'#1a7a1a','3':'#ffaa44'},'🍇':{'1':'#882299','2':'#1a7a1a','3':'#cc66ee'},'🍓':{'1':'#cc1133','2':'#1a7a1a','3':'#ff6688'},'🍌':{'1':'#ddbb00','2':'#1a7a1a','3':'#ffee44'},'🍍':{'1':'#cc8800','2':'#1a7a1a','3':'#ffcc44'}};
const emoji = SUBJECT_EMOJI[subject] || '🍎';
const pool = ALL_ACTIVITIES[subject] || [];

// ── State: 3 slots, each {activity, stage: 'bud'|'flower'|'fruit'} ──
const STORE_KEY = 'pf_subject_buds_' + subject;
let slots = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
if (!slots) {
    slots = pool.slice(0,3).map((act,i)=>({id:i, activity:act, stage:'bud'}));
    localStorage.setItem(STORE_KEY, JSON.stringify(slots));
}

function usedActivities(excludeId) {
    return slots.filter(s=>s.id!==excludeId).map(s=>s.activity);
}
function freshActivity(excludeId) {
    const used = usedActivities(excludeId);
    return pool.find(a=>!used.includes(a)) || pool[0];
}

// ── Tree growth stage logic ──────────────────────────────────────
// 1: all buds -> tree_stage1.png
// 2: at least 1 flower -> tree_stage1.png (same art)
// 3: at least 1 fruit -> tree_stage3.png
// 4: all 3 fruit -> tree_big.png  (and marks subject complete)
function currentTreeStage() {
    if (slots.every(s=>s.stage==='fruit')) return 4;
    if (slots.some(s=>s.stage==='fruit')) return 3;
    return 1; // covers both "all buds" and "has a flower"
}
const STAGE_IMG = {1:'tree_stage1.png', 3:'tree_stage3.png', 4:'tree_big.png'};

// Node positions per stage (fractions of displayed image box)
const NODE_POS = {
    1: [[0.30,0.42],[0.50,0.18],[0.70,0.42]],
    3: [[0.28,0.46],[0.50,0.20],[0.72,0.46]],
    4: [[0.26,0.50],[0.50,0.22],[0.74,0.50]],
};

function markSubjectComplete() {
    const done = JSON.parse(localStorage.getItem('pf_subject_complete') || '{}');
    done[subject] = true;
    localStorage.setItem('pf_subject_complete', JSON.stringify(done));
}

// Leveling is now based on CUMULATIVE harvests, not "all 3 fruited at once" —
// every 3 harvests (in any order, any timing) = +1 level for this subject.
function recordHarvest() {
    const harvestCounts = JSON.parse(localStorage.getItem('pf_harvest_counts') || '{}');
    const newTotal = (harvestCounts[subject] || 0) + 1;
    harvestCounts[subject] = newTotal;
    localStorage.setItem('pf_harvest_counts', JSON.stringify(harvestCounts));

    if (newTotal % 3 === 0) {
        const levels = JSON.parse(localStorage.getItem('pf_levels') || '{}');
        levels[subject] = (levels[subject] || 0) + 1;
        localStorage.setItem('pf_levels', JSON.stringify(levels));
    }
}

// Tracks every subject ever started, for the "passions discovered" stat —
// independent of whether it's currently active or completed.
function recordDiscovered() {
    const discovered = JSON.parse(localStorage.getItem('pf_discovered') || '[]');
    if (!discovered.includes(subject)) {
        discovered.push(subject);
        localStorage.setItem('pf_discovered', JSON.stringify(discovered));
    }
}
recordDiscovered();

function saveState() {
    localStorage.setItem(STORE_KEY, JSON.stringify(slots));
    if (slots.every(s=>s.stage==='fruit')) {
        markSubjectComplete();
    }
}

// ── Drawing bud / flower / fruit icons ───────────────────────────
const BUD_PAL={'1':'#0d5c0d','2':'#22aa22','3':'#aaff66','4':'#5C2A00'};
const BUD_GRID=['00111000','01222100','12233210','12333210','01222100','00141000','00040000','00040000'];
const FRUIT_BASE=['00010000','00020000','01111100','13111110','11111110','11111110','01111100','00111000'];
function drawBudCanvas(canvas){const ps=7;canvas.width=8*ps;canvas.height=8*ps;const ctx=canvas.getContext('2d');BUD_GRID.forEach((row,r)=>[...row].forEach((ch,c)=>{const col=BUD_PAL[ch];if(!col)return;ctx.fillStyle=col;ctx.fillRect(c*ps,r*ps,ps,ps);}));}
function drawFruitCanvas(canvas){const ps=7;canvas.width=8*ps;canvas.height=8*ps;const ctx=canvas.getContext('2d');const pal=FRUIT_PALS[emoji]||FRUIT_PALS['🍎'];FRUIT_BASE.forEach((row,r)=>[...row].forEach((ch,c)=>{const col=pal[ch];if(!col)return;ctx.fillStyle=col;ctx.fillRect(c*ps,r*ps,ps,ps);}));}

// ── Render ────────────────────────────────────────────────────
function render() {
    const stage = document.getElementById('stage');
    const img = document.getElementById('tree-img');
    const treeStage = currentTreeStage();
    const src = STAGE_IMG[treeStage] || STAGE_IMG[1];
    if (!img.src.endsWith(src)) {
        img.style.opacity = 0;
        img.onload = () => { img.style.opacity = 1; placeNodes(treeStage); };
        img.src = src;
    } else {
        placeNodes(treeStage);
    }

    // remove existing complete banner
    const oldBanner = stage.querySelector('.complete-banner');
    if (oldBanner) oldBanner.remove();
    if (treeStage === 4) {
        const banner = document.createElement('div');
        banner.className = 'complete-banner';
        banner.textContent = '🏆 ' + subject + ' tree complete!';
        stage.appendChild(banner);
    }
}

function placeNodes(treeStage) {
    const stage = document.getElementById('stage');
    const img = document.getElementById('tree-img');
    stage.querySelectorAll('.node').forEach(n=>n.remove());

    const rect = img.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const offX = rect.left - stageRect.left;
    const offY = rect.top - stageRect.top;
    const positions = NODE_POS[treeStage] || NODE_POS[1];

    slots.forEach((slot, i) => {
        const [xf, yf] = positions[i] || positions[positions.length-1];
        const x = offX + xf * rect.width;
        const y = offY + yf * rect.height;
        const node = document.createElement('div');
        node.className = 'node';
        node.style.left = x + 'px';
        node.style.top = y + 'px';

        if (slot.stage === 'bud') {
            const nc = document.createElement('canvas');
            drawBudCanvas(nc);
            nc.style.width = '34px'; nc.style.height = '34px';
            node.appendChild(nc);
        } else if (slot.stage === 'flower') {
            const fi = document.createElement('img');
            fi.src = 'flower.png';
            fi.style.width = '40px'; fi.style.height = 'auto';
            node.appendChild(fi);
        } else {
            const nc = document.createElement('canvas');
            drawFruitCanvas(nc);
            nc.style.width = '34px'; nc.style.height = '34px';
            node.appendChild(nc);
        }
        node.addEventListener('click', () => openPopup(slot.id));
        stage.appendChild(node);
    });
}

// ── Popup interactions ───────────────────────────────────────────
let activeId = null;
let pendingPhoto = null; // compressed base64 data URL, or null
function mkBtn(cls, label, fn) { const b=document.createElement('button'); b.className=cls; b.textContent=label; b.onclick=fn; return b; }

// Resize + re-encode an image file client-side to keep localStorage small.
// Caps the longest edge at 480px and re-encodes as JPEG (~quality 0.7).
function compressImage(file, maxEdge=480, quality=0.7) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;
                if (width > height && width > maxEdge) { height = Math.round(height * maxEdge / width); width = maxEdge; }
                else if (height > maxEdge) { width = Math.round(width * maxEdge / height); height = maxEdge; }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

function renderPhotoArea() {
    const area = document.getElementById('photo-area');
    if (pendingPhoto) {
        area.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'photo-preview-wrap';
        const img = document.createElement('img');
        img.className = 'photo-preview';
        img.src = pendingPhoto;
        const rm = document.createElement('button');
        rm.className = 'photo-remove';
        rm.textContent = '✕';
        rm.onclick = () => { pendingPhoto = null; renderPhotoArea(); };
        wrap.appendChild(img);
        wrap.appendChild(rm);
        area.appendChild(wrap);
    } else {
        area.innerHTML = '<button type="button" class="photo-upload-btn" onclick="document.getElementById(\'photo-input\').click()">📷 Add a photo (optional)</button>';
    }
}

async function handlePhotoSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
        pendingPhoto = await compressImage(file);
        renderPhotoArea();
    } catch (e) {
        console.error('Photo processing failed', e);
        alert('Could not process that image. Try a different one.');
    }
    event.target.value = '';
}

function openPopup(id) {
    activeId = id;
    const slot = slots.find(s=>s.id===id);
    const btns = document.getElementById('pop-btns');
    btns.innerHTML = '';
    const emojiEl = document.getElementById('pop-emoji');
    const photoSection = document.getElementById('photo-section');
    pendingPhoto = null;
    photoSection.style.display = 'none';

    if (slot.stage === 'bud') {
        emojiEl.innerHTML = '🌱';
        document.getElementById('pop-title').textContent = slot.activity;
        document.getElementById('pop-sub').textContent = 'Want to try this activity?';
        btns.appendChild(mkBtn('btn-yes','🌸 Open it',()=>openBud(id)));
        btns.appendChild(mkBtn('btn-no','Not now',closePopup));
    } else if (slot.stage === 'flower') {
        emojiEl.innerHTML = '<img src="flower.png" alt="flower">';
        document.getElementById('pop-title').textContent = slot.activity;
        document.getElementById('pop-sub').textContent = 'Did you try this activity?';
        photoSection.style.display = 'flex';
        renderPhotoArea();
        btns.appendChild(mkBtn('btn-yes','✓ Done it!',()=>markDone(id)));
        btns.appendChild(mkBtn('btn-skip','↩ Swap it',()=>swapActivity(id)));
        btns.appendChild(mkBtn('btn-no','✗ Not yet',closePopup));
    } else {
        emojiEl.textContent = emoji;
        document.getElementById('pop-title').textContent = 'Reward Earned!';
        document.getElementById('pop-sub').textContent = 'You completed "'+slot.activity+'" in '+subject+'. Keep it up!';
        if (slot.photo) {
            photoSection.style.display = 'flex';
            const area = document.getElementById('photo-area');
            area.innerHTML = '<img class="photo-preview" src="'+slot.photo+'" alt="activity photo" style="width:160px;height:120px;">';
        }
        btns.appendChild(mkBtn('btn-yes','🧺 Harvest',()=>harvestSlot(id)));
        btns.appendChild(mkBtn('btn-gold','Nice! ✓',closePopup));
    }
    document.getElementById('overlay').classList.add('active');
}

function closePopup() { document.getElementById('overlay').classList.remove('active'); activeId = null; }

function openBud(id) {
    const slot = slots.find(s=>s.id===id);
    slot.stage = 'flower';
    saveState();
    closePopup();
    render();
}

function markDone(id) {
    const slot = slots.find(s=>s.id===id);
    slot.stage = 'fruit';
    if (pendingPhoto) slot.photo = pendingPhoto;
    saveState();
    // also log into the shared book
    const book = JSON.parse(localStorage.getItem('pf_book') || '[]');
    const entry = {activity: slot.activity, subject: subject, emoji: emoji};
    if (pendingPhoto) entry.photo = pendingPhoto;
    book.push(entry);
    try {
        localStorage.setItem('pf_book', JSON.stringify(book));
    } catch (e) {
        // Storage quota likely exceeded from accumulated photos.
        console.error('Could not save book entry with photo', e);
        delete entry.photo;
        book[book.length-1] = entry;
        try { localStorage.setItem('pf_book', JSON.stringify(book)); } catch(e2) {}
        alert("Saved, but your photo couldn't be stored (storage is full). The activity was still marked done.");
    }
    pendingPhoto = null;
    closePopup();
    render();
}

function swapActivity(id) {
    const slot = slots.find(s=>s.id===id);
    slot.activity = freshActivity(id);
    slot.stage = 'bud';
    saveState();
    closePopup();
    render();
}

function harvestSlot(id) {
    const slot = slots.find(s=>s.id===id);
    recordHarvest();
    slot.activity = freshActivity(id);
    slot.stage = 'bud';
    delete slot.photo;
    saveState();
    closePopup();
    render();
}

function goBack() { window.location.href = 'tree.html'; }

window.addEventListener('resize', render);
render();
</script>
</body>
</html>
